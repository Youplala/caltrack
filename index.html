<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#1a1a2e;--card:#16213e;--card2:#1e2a47;--accent:#4ade80;--red:#ef4444;--blue:#60a5fa;--orange:#fb923c;--yellow:#fbbf24;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--radius:16px;--safe-b:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text)}
.app{height:100%;display:flex;flex-direction:column}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(80px + var(--safe-b));opacity:0;pointer-events:none;transform:translateY(12px);transition:opacity .25s,transform .25s}
.page.active{opacity:1;pointer-events:auto;transform:none}
header{padding:16px 16px 0;text-align:center;position:relative}
header h1{font-size:20px;font-weight:700}
header .date{color:var(--text2);font-size:13px;margin-top:2px}
.refresh-btn{position:absolute;right:4px;top:16px;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:8px;transition:transform .3s,color .2s}
.refresh-btn:active{color:var(--accent)}
.refresh-btn.spinning{animation:spin .6s ease}

/* Bottom nav */
.nav{display:flex;background:var(--card);border-top:1px solid rgba(255,255,255,.06);padding-bottom:var(--safe-b)}
.nav button{flex:1;background:none;border:none;color:var(--text3);font-size:10px;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:color .2s}
.nav button.active{color:var(--accent)}
.nav button svg{width:22px;height:22px}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card h3{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}

/* Ring */
.ring-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0 8px}
.ring-container{position:relative;width:180px;height:180px}
.ring-container svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-container circle{fill:none;stroke-width:10}
.ring-bg{stroke:var(--card2)}
.ring-fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .6s ease,stroke .3s}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-cal{font-size:36px;font-weight:800;line-height:1}
.ring-label{font-size:12px;color:var(--text2);margin-top:4px}
.ring-target{font-size:12px;color:var(--text3);margin-top:2px}

/* Macros */
.macros{display:flex;gap:12px;margin-top:8px}
.macro{flex:1;text-align:center}
.macro-label{font-size:11px;color:var(--text2);margin-bottom:6px}
.macro-bar{height:6px;border-radius:3px;background:var(--card2);overflow:hidden;margin-bottom:4px}
.macro-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.macro-val{font-size:13px;font-weight:600}
.macro-pct{font-size:10px;color:var(--text3)}

/* Meals */
.meal-header{display:flex;justify-content:space-between;align-items:center}
.meal-header h3{margin:0}
.meal-cal{font-size:14px;font-weight:600;color:var(--accent)}
.meal-add{background:var(--card2);border:none;color:var(--accent);width:32px;height:32px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.meal-add:active{background:rgba(74,222,128,.15)}
.meal-items{margin-top:8px}
.meal-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.meal-item:last-child{border:none}
.meal-item-info{flex:1;min-width:0}
.meal-item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meal-item-macros{font-size:11px;color:var(--text3);margin-top:2px}
.meal-item-cal{font-size:14px;font-weight:600;color:var(--text2);margin:0 12px;white-space:nowrap}
.meal-item-del{background:none;border:none;color:var(--red);opacity:.5;font-size:18px;cursor:pointer;padding:8px;margin:-8px;transition:opacity .2s}
.meal-item-del:active{opacity:1}
.empty-meal{color:var(--text3);font-size:13px;text-align:center;padding:12px 0}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:500px;padding:24px 20px calc(20px + var(--safe-b));transform:translateY(100%);transition:transform .3s ease}
.modal-overlay.open .modal{transform:none}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px;text-align:center}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text3);font-size:24px;cursor:pointer}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.form-group input{width:100%;background:var(--bg);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:active{opacity:.8}
.btn-primary{background:var(--accent);color:#000}
.btn-danger{background:var(--red);color:#fff}
.btn-secondary{background:var(--card2);color:var(--text)}

/* History */
.hist-week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;text-align:center}
.hist-day-label{font-size:10px;color:var(--text3);padding:4px 0}
.hist-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:600;cursor:pointer;background:var(--card2);transition:background .2s,transform .15s}
.hist-day:active{transform:scale(.93)}
.hist-day.today{border:2px solid var(--accent)}
.hist-day.has-data.under{background:rgba(74,222,128,.15);color:var(--accent)}
.hist-day.has-data.over{background:rgba(239,68,68,.15);color:var(--red)}
.hist-day.empty{background:transparent;cursor:default}
.hist-day .d-num{font-size:14px}
.hist-day .d-cal{font-size:8px;margin-top:1px;opacity:.7}
.hist-month{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hist-month h3{font-size:16px;font-weight:700;margin:0}
.hist-month button{background:var(--card2);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer}
.hist-avg{text-align:center;color:var(--text2);font-size:13px;margin-bottom:16px}
.hist-avg span{color:var(--accent);font-weight:700}
.hist-detail{animation:fadeIn .2s}
.hist-detail .back-btn{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;gap:4px}

/* Settings */
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.setting-row:last-child{border:none}
.setting-label{font-size:14px}
.setting-value{font-size:14px;color:var(--accent);font-weight:600}
.setting-input{background:var(--bg);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px;width:80px;text-align:right;outline:none}
.setting-input:focus{border-color:var(--accent)}
.setting-select{background:var(--bg);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px;outline:none;-webkit-appearance:none}
.setting-select:focus{border-color:var(--accent)}
.calc-box{background:var(--bg);border-radius:12px;padding:14px;margin:12px 0}
.calc-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.calc-row span:first-child{color:var(--text2)}
.calc-row span:last-child{font-weight:600}
.setting-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.macro-slider{display:flex;align-items:center;gap:8px;margin-top:6px}
.macro-slider input[type=range]{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--card2);outline:none}
.macro-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;cursor:pointer}
.macro-slider .ms-val{font-size:13px;font-weight:600;min-width:36px;text-align:right}

/* Dishes */
.dish-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.dish-card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .15s}
.dish-card:active{transform:scale(.97)}
.dish-photo{width:100%;aspect-ratio:1;object-fit:cover;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:48px}
.dish-photo img{width:100%;height:100%;object-fit:cover}
.dish-info{padding:10px 12px}
.dish-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dish-meta{font-size:11px;color:var(--text2);margin-top:3px}
.dish-macros{font-size:10px;color:var(--text3);margin-top:2px}
.dish-used{font-size:10px;color:var(--text3);margin-top:2px}
.dish-add-btn{position:fixed;bottom:calc(76px + var(--safe-b));right:20px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#000;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(74,222,128,.3);z-index:50;display:none;align-items:center;justify-content:center;transition:transform .15s}
.dish-add-btn:active{transform:scale(.9)}
.dish-add-btn.show{display:flex}
.dish-empty{text-align:center;color:var(--text3);padding:40px 20px;font-size:14px}
.dish-detail-header{display:flex;gap:16px;align-items:flex-start}
.dish-detail-photo{width:100px;height:100px;border-radius:12px;object-fit:cover;background:var(--card2);flex-shrink:0}
.dish-detail-info{flex:1;min-width:0}
.dish-detail-name{font-size:18px;font-weight:700}
.dish-detail-desc{font-size:13px;color:var(--text2);margin-top:4px}
.dish-actions{display:flex;gap:8px;margin-top:16px}
.dish-actions .btn{flex:1}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
<div class="pages">
<!-- TODAY -->
<div class="page active" id="page-today">
<header>
<h1>CalTrack</h1>
<button class="refresh-btn" id="refresh-btn" onclick="doRefresh()">↻</button>
<div class="date" id="today-date"></div>
</header>
<div class="card" style="margin-top:16px">
<div class="ring-wrap">
<div class="ring-container">
<svg viewBox="0 0 200 200"><circle class="ring-bg" cx="100" cy="100" r="88"/><circle class="ring-fg" id="ring" cx="100" cy="100" r="88"/></svg>
<div class="ring-center">
<div class="ring-cal" id="ring-consumed">0</div>
<div class="ring-label">consommées</div>
<div class="ring-target" id="ring-remaining"></div>
</div>
</div>
</div>
<div class="macros" id="macros"></div>
</div>
<div id="meals"></div>
</div>

<!-- HISTORY -->
<div class="page" id="page-history">
<header><h1>Historique</h1></header>
<div style="margin-top:16px" id="history-content"></div>
</div>

<!-- DISHES -->
<div class="page" id="page-dishes">
<header><h1>Mes Plats</h1></header>
<div style="margin-top:16px" id="dishes-content"></div>
</div>

<!-- SETTINGS -->
<div class="page" id="page-settings">
<header><h1>Réglages</h1></header>
<div style="margin-top:16px" id="settings-content"></div>
</div>
</div>

<nav class="nav">
<button class="active" data-page="today">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
Aujourd'hui
</button>
<button data-page="history">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
Historique
</button>
<button data-page="dishes">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/><circle cx="7" cy="6" r="1" fill="currentColor"/><circle cx="7" cy="12" r="1" fill="currentColor"/><circle cx="7" cy="18" r="1" fill="currentColor"/></svg>
Plats
</button>
<button data-page="settings">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4m-9.7-6.3 2.8-2.8m11.8-4.2 2.8-2.8M1 12h4m14 0h4M4.3 4.3l2.8 2.8m9.8 9.8 2.8 2.8"/></svg>
Réglages
</button>
</nav>
</div>

<button class="dish-add-btn" onclick="openAddDish()">+</button>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
<div class="modal" id="modal"></div>
</div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const MEALS = ['Petit-déjeuner','Déjeuner','Snack','Dîner'];
const MEAL_ICONS = ['☀️','🍽️','🍎','🌙'];
const ACTIVITY_LABELS = ['Sédentaire','Légèrement actif','Actif'];
const ACTIVITY_MULT = [1.2, 1.375, 1.55];
const DEFICIT_OPTIONS = [250, 500, 750];

function todayKey(){ return new Date().toISOString().slice(0,10) }
function dateKey(d){ return d.toISOString().slice(0,10) }

function getSettings(){
  const def = {weight:81,height:173,age:25,sex:'M',activity:1,deficit:1,protPct:30,carbPct:40,fatPct:30};
  try{ return {...def,...JSON.parse(localStorage.getItem('ct_settings')||'{}')} }catch(e){return def}
}
function saveSettings(s){ localStorage.setItem('ct_settings',JSON.stringify(s)) }

function calcBMR(s){ return 10*s.weight + 6.25*s.height - 5*s.age + 5 }
function calcTDEE(s){ return Math.round(calcBMR(s)*ACTIVITY_MULT[s.activity]) }
function calcTarget(s){ return Math.round(calcTDEE(s)-DEFICIT_OPTIONS[s.deficit]) }
function macroGrams(s){
  const t=calcTarget(s);
  return {prot:Math.round(t*s.protPct/100/4),carb:Math.round(t*s.carbPct/100/4),fat:Math.round(t*s.fatPct/100/9)}
}

function getDayData(key){
  try{return JSON.parse(localStorage.getItem('ct_'+key))||{meals:[[],[],[],[]]};}catch(e){return{meals:[[],[],[],[]]};}
}
function saveDayData(key,d){localStorage.setItem('ct_'+key,JSON.stringify(d))}

function sumDay(d){
  let cal=0,p=0,c=0,f=0;
  d.meals.forEach(m=>m.forEach(i=>{cal+=i.cal||0;p+=i.p||0;c+=i.c||0;f+=i.f||0}));
  return {cal,p,c,f}
}

// Navigation
let currentPage='today';
$$('.nav button').forEach(b=>{
  b.addEventListener('click',()=>{
    currentPage=b.dataset.page;
    $$('.nav button').forEach(x=>x.classList.toggle('active',x===b));
    $$('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+currentPage));
    if(currentPage==='today')renderToday();
    else if(currentPage==='history')renderHistory();
    else if(currentPage==='dishes')renderDishes();
    else renderSettings();
    // Show/hide FAB
    document.querySelector('.dish-add-btn').classList.toggle('show',currentPage==='dishes');
  });
});

// Modal
function openModal(html){
  $('#modal').innerHTML=html;
  $('#modal-overlay').classList.add('open');
}
function closeModal(){$('#modal-overlay').classList.remove('open')}
$('#modal-overlay').addEventListener('click',e=>{if(e.target===$('#modal-overlay'))closeModal()});

// TODAY
function renderToday(){
  const s=getSettings(), key=todayKey(), data=getDayData(key), sum=sumDay(data);
  const target=calcTarget(s), mg=macroGrams(s);
  const pct=Math.min(sum.cal/target,1.2);
  const circ=2*Math.PI*88;
  const ring=$('#ring');
  ring.style.strokeDasharray=circ;
  ring.style.strokeDashoffset=circ*(1-Math.min(pct,1));
  ring.style.stroke=sum.cal>target?'var(--red)':'var(--accent)';
  $('#ring-consumed').textContent=sum.cal;
  $('#ring-consumed').style.color=sum.cal>target?'var(--red)':'var(--accent)';
  const rem=target-sum.cal;
  $('#ring-remaining').textContent=rem>=0?`${rem} restantes`:`${Math.abs(rem)} en trop`;
  const d=new Date();
  const dayNames=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const monthNames=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  $('#today-date').textContent=`${dayNames[d.getDay()]} ${d.getDate()} ${monthNames[d.getMonth()]}`;

  // Macros
  const macroData=[
    {label:'Protéines',val:sum.p,max:mg.prot,color:'var(--blue)'},
    {label:'Glucides',val:sum.c,max:mg.carb,color:'var(--orange)'},
    {label:'Lipides',val:sum.f,max:mg.fat,color:'var(--yellow)'}
  ];
  $('#macros').innerHTML=macroData.map(m=>`
    <div class="macro">
      <div class="macro-label">${m.label}</div>
      <div class="macro-bar"><div class="macro-bar-fill" style="width:${Math.min(m.val/m.max*100,100)}%;background:${m.color}"></div></div>
      <div class="macro-val" style="color:${m.color}">${m.val}g</div>
      <div class="macro-pct">/ ${m.max}g</div>
    </div>
  `).join('');

  // Meals
  $('#meals').innerHTML=MEALS.map((name,i)=>{
    const items=data.meals[i]||[];
    const mealCal=items.reduce((a,x)=>a+(x.cal||0),0);
    return `<div class="card">
      <div class="meal-header">
        <h3>${MEAL_ICONS[i]} ${name}</h3>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="meal-cal">${mealCal} kcal</span>
          <button class="meal-add" onclick="openAddFood(${i})">+</button>
        </div>
      </div>
      <div class="meal-items">
        ${items.length?items.map((it,j)=>`
          <div class="meal-item">
            <div class="meal-item-info">
              <div class="meal-item-name">${it.name}</div>

// HISTORY
let histDate=new Date();
let histDetail=null;

function renderHistory(){
  if(histDetail)return renderHistDetail(histDetail);
  const s=getSettings(),target=calcTarget(s);
  const y=histDate.getFullYear(),m=histDate.getMonth();
  const monthNames=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const dayLabels=['L','M','M','J','V','S','D'];
  let startDay=(first.getDay()+6)%7;

  // Weekly average
  const now=new Date(),weekStart=new Date(now);
  weekStart.setDate(now.getDate()-now.getDay()+1);
  let weekTotal=0,weekDays=0;
  for(let i=0;i<7;i++){
    const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);
    const dk=dateKey(d),dd=getDayData(dk),ds=sumDay(dd);
    if(ds.cal>0){weekTotal+=ds.cal;weekDays++}
  }
  const weekAvg=weekDays?Math.round(weekTotal/weekDays):0;

  let cells=dayLabels.map(d=>`<div class="hist-day-label">${d}</div>`).join('');
  for(let i=0;i<startDay;i++)cells+=`<div class="hist-day empty"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const dk=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dd=getDayData(dk),ds=sumDay(dd);
    const isToday=dk===todayKey();
    const has=ds.cal>0;
    const cls=['hist-day',isToday?'today':'',has?'has-data':'',has?(ds.cal<=target?'under':'over'):''].filter(Boolean).join(' ');
    cells+=`<div class="${cls}" onclick="showHistDetail('${dk}')"><span class="d-num">${d}</span>${has?`<span class="d-cal">${ds.cal}</span>`:''}</div>`;
  }

  $('#history-content').innerHTML=`
    <div class="hist-month">
      <button onclick="histNav(-1)">‹</button>
      <h3>${monthNames[m]} ${y}</h3>
      <button onclick="histNav(1)">›</button>
    </div>
    <div class="hist-avg">Moyenne cette semaine : <span>${weekAvg} kcal</span></div>
    <div class="hist-week">${cells}</div>
  `;
}

window.histNav=function(dir){
  histDate.setMonth(histDate.getMonth()+dir);
  renderHistory();
};

window.updateSetting=function(k,v){const s=getSettings();s[k]=v;saveSettings(s)};

window.adjustMacro=function(k,v){
  const s=getSettings();
  s[k]=v;
  // Auto-balance: adjust the other two proportionally
  const keys=['protPct','carbPct','fatPct'];
  const others=keys.filter(x=>x!==k);
  const remaining=100-v;
  const otherSum=s[others[0]]+s[others[1]];
  if(otherSum>0){
    s[others[0]]=Math.round(remaining*s[others[0]]/otherSum);
    s[others[1]]=100-v-s[others[0]];
  }else{
    s[others[0]]=Math.round(remaining/2);
    s[others[1]]=remaining-s[others[0]];
  }
  if(s[others[1]]<10){s[others[1]]=10;s[others[0]]=remaining-10;}
  if(s[others[0]]<10){s[others[0]]=10;s[others[1]]=remaining-10;}
  saveSettings(s);renderSettings();
};

// API Sync — loads data from SQLite server into localStorage
async function syncFromAPI(){
  try {
    // Sync profile/settings
    const profile = await fetch('/api/profile').then(r=>r.ok?r.json():null);
    if(profile){
      const s = getSettings();
      s.weight = profile.weight_kg;
      s.height = profile.height_cm;
      s.age = profile.age;
      const actMap = {'sedentary':0,'light':1,'active':2};
      if(profile.activity in actMap) s.activity = actMap[profile.activity];
      s.protPct = Math.round(profile.protein_ratio*100);
      s.carbPct = Math.round(profile.carbs_ratio*100);
      s.fatPct = Math.round(profile.fat_ratio*100);
      const defMap = {250:0, 500:1, 750:2};
      if(profile.deficit in defMap) s.deficit = defMap[profile.deficit];
      saveSettings(s);
    }

    // Sync today
    await syncDay(todayKey());

    // Sync last 30 days of history
    const hist = await fetch('/api/history?days=60').then(r=>r.ok?r.json():null);
    if(hist && hist.days){
      for(const day of hist.days){
        if(day.date !== todayKey()) await syncDay(day.date);
      }
    }
  } catch(e){ console.log('API sync unavailable, using localStorage') }
  renderToday();
}

const MEAL_TYPE_MAP = {'petit_dej':0, 'dejeuner':1, 'snack':2, 'diner':3};

async function syncDay(date){
  try {
    const dayData = await fetch('/api/day?date='+date).then(r=>r.ok?r.json():null);
    if(!dayData || !dayData.meals || dayData.meals.length === 0) return;
    const converted = {meals:[[],[],[],[]]};
    for(const meal of dayData.meals){
      const idx = MEAL_TYPE_MAP[meal.type];
      if(idx === undefined) continue;
      for(const item of (meal.items||[])){
        converted.meals[idx].push({
          name: item.name,
          cal: item.kcal || 0,
          p: item.protein || 0,
          c: item.carbs || 0,
          f: item.fat || 0,
          portion: item.quantity || ''
        });
      }
    }
    // Only overwrite if API has data
    const hasData = converted.meals.some(m=>m.length>0);
    if(hasData) saveDayData(date, converted);
  } catch(e){}
}

window.doRefresh=async function(){
  const btn=$('#refresh-btn');
  btn.classList.remove('spinning');
  void btn.offsetWidth; // reflow
  btn.classList.add('spinning');
  await syncFromAPI();
};

// Init
syncFromAPI();
</script>
</body>
